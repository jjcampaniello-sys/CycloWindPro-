<!DOCTYPE html>
<html>
<head>
    <title>CycloWind</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com" />
</head>
<body>

<div class="top-bar">
    <button id="startNavBtn" onclick="startNavigation()" style="background-color: #2ecc71; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer;">
        Démarrer
    </button>
    <button onclick="getRoute()">
        Calculer trajet
    </button>
    <button onclick="clearRouteLayers()">Supprimer trajet</button>
</div>
  
<div class="search-box">
    <input id="destination" oninput="searchDestination()" placeholder="Entrer une destination">
    <div id="suggestions" style="background:white; position:absolute; z-index:1000; width:90%; max-height:200px; overflow:auto; border:1px solid #ccc; display:none;"></div>    
</div>

<!-- LE CONTENEUR DE LA CARTE (Bien isolé et fermé) -->
<div id="map"></div>

<!-- BLOCS DE CONTRÔLE ET D'ANALYSE DU VENT -->
<div class="wind-container-left">
    <button id="toggleRouteBtn" style="display:none;">Voir la route alternative</button>
</div>

<div id="windInfo" style="display:none;"></div>

<!-- CHARGEMENT DES SCRIPT DANS LE BON ORDRE -->
<!-- 1. Bibliothèque Leaflet d'abord -->
<script src="https://unpkg.com"></script>

<!-- 2. Vos scripts de logique corrigés (Suppression des doublons) -->
<script src="js/wind.js"></script>
<script src="js/bike.js"></script>
<script src="js/search.js"></script>
<script src="js/route.js"></script>

<!-- 3. Initialisation de l'application et Simulation Météo/GPS -->
<script>
    // Initialisation unique de la carte (Bouscule Paris par défaut)
    window.map = L.map('map').setView([48.8566, 2.3522], 13);
    
    // Chargement des tuiles OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(window.map);

    // MODE SIMULATION : S'exécute immédiatement sur ordinateur ou smartphone si le GPS bloque
    setTimeout(function() {
        // Recalcule les dimensions pour forcer la carte à prendre tout l'espace CSS disponible
        window.map.invalidateSize();

        if (!window.userPosition || window.userPosition.length < 2) {
            console.log("⚡ Mode simulation : Injection position départ (Paris Centre)");
            window.userPosition = [48.8566, 2.3522]; 
        }

        if (!window.destination) {
            console.log("⚡ Mode simulation : Injection position arrivée (La Défense)");
            window.destination = {
                lat: 48.8925,
                lon: 2.2359 
            };
        }

        // Lancement automatique du premier calcul d'itinéraire au démarrage
        if (typeof window.getRoute === "function") {
            window.getRoute();
        } else {
            console.error("Erreur : La fonction getRoute() n'a pas été trouvée. Vérifiez le chemin de js/route.js");
        }
    }, 400); // Léger délai pour s'assurer que le navigateur a fini d'interpréter le CSS
</script>

</body>
</html>
